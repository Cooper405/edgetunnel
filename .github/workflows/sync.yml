name: Upstream Sync and Deploy

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-deploy:
    name: Sync upstream + deploy to CF Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync upstream changes
        uses: aormsby/fork-sync-with-upstream-action@v3.4.3
        with:
          upstream_sync_repo: cmliu/edgetunnel
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] sync failed"
          exit 1

      - name: Deploy to caiai
        run: |
          HASH=$(sha256sum _worker.js | cut -d" " -f1)
          echo "{"_worker.js":"$HASH"}" > manifest.json
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/5d41e12dd90b5ffdd983188ff9910cff/pages/projects/caiai/deployments"             -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}"             -F "manifest=@manifest.json"             -F "_worker.js@_worker.js"

      - name: Deploy to xiangmucfoo
        run: |
          HASH=$(sha256sum _worker.js | cut -d" " -f1)
          echo "{"_worker.js":"$HASH"}" > manifest.json
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/5d41e12dd90b5ffdd983188ff9910cff/pages/projects/xiangmucfoo/deployments"             -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}"             -F "manifest=@manifest.json"             -F "_worker.js@_worker.js"
