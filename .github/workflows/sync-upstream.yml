name: 🔄 自动同步上游更新

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: repo-sync/github-sync@v2
        with:
          source_repo: "cmliu/edgetunnel"
          source_branch: "main"
          destination_branch: "main"
          sync_tags: "false"
          diffs_only: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
