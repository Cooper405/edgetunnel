name: 🔄 自动同步上游更新

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 同步上游更新
        uses: repo-sync/github-sync@v2
        with:
          source_repo: "cmliu/edgetunnel"
          source_branch: "main"
          destination_branch: "main"
          sync_tags: "false"
          diffs_only: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 部署到 Cloudflare Pages
        run: |
          # 下载最新 _worker.js 并部署到 Pages
          curl -L -o _worker.js https://raw.githubusercontent.com/Cooper405/edgetunnel/main/_worker.js
          HASH=$(sha256sum _worker.js | cut -d" " -f1)
          echo "{\"_worker.js\":\"$HASH\"}" > manifest.json
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/5d41e12dd90b5ffdd983188ff9910cff/pages/projects/caiai/deployments" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F "manifest=@manifest.json" \
            -F "_worker.js=@_worker.js" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}"

